name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Commit error log if failed
        if: failure()
        run: |
          ERRORS=$(cat /tmp/build.log | grep -E "error:|Error " | head -20 || echo "no specific errors found")
          echo "BUILD ERRORS:" > error_report.txt
          echo "$ERRORS" >> error_report.txt
          cat /tmp/build.log | grep -A3 -B1 "error:" >> error_report.txt 2>/dev/null || true

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-errors
          path: /tmp/build.log
          retention-days: 1

      - name: Copy APK
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA Voice Controller
            100% offline AI voice controller for Android. No internet. No third-party AI SDKs.

            ### Install
            1. Download NOVA-*.apk below
            2. Open on your Android phone
            3. Allow "Install unknown apps" if prompted → Install
            4. Open NOVA → grant permissions → enable Accessibility → train wake word
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}