name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/NOVA-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: app/build/outputs/apk/debug/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android. No internet. No third-party SDKs.

            ### How to install
            1. Download NOVA-*.apk below
            2. Open it on your Android phone
            3. If prompted, allow "Install unknown apps" for your browser
            4. Tap Install
            5. Open NOVA, grant permissions, enable Accessibility Service, train your wake word

            ### Requirements
            - Android 8.0 or higher
            - 3 GB RAM minimum
          files: app/build/outputs/apk/debug/NOVA-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}