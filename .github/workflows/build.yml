name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Build APK and capture errors
        run: |
          gradle assembleDebug 2>&1 | tee /tmp/build.txt || true
          if grep -q "BUILD SUCCESSFUL" /tmp/build.txt; then
            echo "BUILD_OK=true" >> $GITHUB_ENV
          else
            echo "BUILD_OK=false" >> $GITHUB_ENV
            {
              echo "=== Kotlin errors ==="
              grep "^e: " /tmp/build.txt || echo "none"
              echo ""
              echo "=== FAILED tasks ==="
              grep "FAILED\|Caused by:" /tmp/build.txt | head -10 || echo "none"
              echo ""
              echo "=== Last 50 lines ==="
              tail -50 /tmp/build.txt
            } > BUILD_ERRORS.txt
            git config user.email "ci@nova.app"
            git config user.name "NOVA CI"
            git add BUILD_ERRORS.txt
            git diff --cached --quiet || git commit -m "ci: build errors $(date +%s)"
            git push || true
          fi

      - name: Fail if build failed
        if: env.BUILD_OK == 'false'
        run: exit 1

      - name: Copy APK
        if: env.BUILD_OK == 'true'
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;

      - name: Upload APK as artifact
        if: env.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: env.BUILD_OK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "NOVA v1.0.${{ github.run_number }}"
          body: |
            ## NOVA Voice Controller
            100% offline AI voice controller for Android. No internet. No third-party AI SDKs.

            ### Install
            1. Download NOVA-*.apk below
            2. Open on your Android phone
            3. Allow "Install unknown apps" if prompted → tap Install
            4. Open NOVA → grant permissions → enable Accessibility → train wake word
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}