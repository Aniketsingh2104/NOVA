name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Copy APK to release folder
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;
          ls -lh release/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "NOVA v1.0.${{ github.run_number }}"
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android.
            No internet. No third-party AI SDKs. Built entirely from scratch.

            ### How to install
            1. Download **NOVA-v1.0.${{ github.run_number }}.apk** below
            2. Open it on your Android phone
            3. If prompted allow **Install unknown apps** then tap **Install**
            4. Open NOVA, grant Microphone + Phone permissions
            5. Settings → Accessibility → NOVA Voice Controller → Enable
            6. In NOVA app: Set Wake Word → record 20 samples → Train
            7. Say your wake word — NOVA replies "Yes?"

            ### Requirements
            - Android 8.0 or higher
            - 3 GB RAM minimum

            ### Features
            Custom wake word • Calls • SMS • Open apps
            Volume, brightness, WiFi, Bluetooth, flashlight
            Navigate, screenshot • PC control • Smart home
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}