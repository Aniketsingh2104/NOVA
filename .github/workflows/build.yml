name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build APK and capture errors
        run: |
          ./gradlew assembleDebug 2>&1 | tee /tmp/build.log || true
          # Extract errors and write to repo file
          grep -n "error:\|e: \|FAILED\|unresolved reference\|cannot find" /tmp/build.log | head -50 > build_errors.txt || echo "Build log captured" > build_errors.txt
          echo "EXIT_CODE=$(./gradlew assembleDebug > /dev/null 2>&1; echo $?)" >> build_errors.txt
          cat /tmp/build.log | grep "error:" | head -30 >> build_errors.txt || true

      - name: Commit error report
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add build_errors.txt
          git commit -m "Build error report" --allow-empty
          git push

      - name: Check if APK built
        run: |
          if find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q apk; then
            echo "APK_BUILT=true" >> $GITHUB_ENV
          else
            echo "APK_BUILT=false" >> $GITHUB_ENV
            echo "Build failed — check build_errors.txt in repo"
            exit 1
          fi

      - name: Copy APK
        if: env.APK_BUILT == 'true'
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;

      - name: Upload APK artifact
        if: env.APK_BUILT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: env.APK_BUILT == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA Voice Controller
            100% offline AI voice controller for Android.

            ### Install
            1. Download NOVA-*.apk below
            2. Open on your Android phone — tap Install
            3. Enable Accessibility Service in Settings
            4. Train your wake word in the app
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}