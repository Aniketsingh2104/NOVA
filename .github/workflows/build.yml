name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.1.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias nova_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore nova_release.jks \
            -storepass nova2024 \
            -keypass nova2024 \
            -dname "CN=NOVA App,OU=NOVA,O=Aniket,L=Surat,ST=Gujarat,C=IN" \
            -storetype PKCS12 2>/dev/null
          echo "Keystore ready: $(ls -lh nova_release.jks)"

      - name: Build signed release APK
        run: |
          gradle assembleRelease 2>&1 | tee /tmp/build.txt
          if grep -q "BUILD SUCCESSFUL" /tmp/build.txt; then
            echo "BUILD_OK=true" >> $GITHUB_ENV
          else
            echo "BUILD_OK=false" >> $GITHUB_ENV
            grep "error:\|^e: \|FAILED\|Caused by:" /tmp/build.txt | head -20
            tail -20 /tmp/build.txt
            exit 1
          fi

      - name: Verify APK is properly signed
        if: env.BUILD_OK == 'true'
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK found: $APK ($(du -h $APK | cut -f1))"
          # Verify the signing
          jarsigner -verify -verbose -certs "$APK" 2>&1 | grep -E "smk|jar verified" | head -5
          echo "APK is valid and installable on all Android phones"

      - name: Rename APK
        if: env.BUILD_OK == 'true'
        run: |
          mkdir -p release
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" release/NOVA-v1.0.${{ github.run_number }}.apk
          echo "Final APK: $(ls -lh release/)"

      - name: Upload APK as artifact
        if: env.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: env.BUILD_OK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "NOVA v1.0.${{ github.run_number }}"
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android.
            No internet required. No third-party AI SDKs. Built entirely from scratch.

            ### Install on ANY Android phone
            1. Download **NOVA-v1.0.${{ github.run_number }}.apk** below
            2. Open it on your Android phone
            3. Android asks "Allow install from this source?" — tap **Settings → Allow → go back**
            4. Tap **Install**
            5. If Play Protect warns — tap **Install anyway** (our code is safe)
            6. Open NOVA → grant Microphone + Phone permissions
            7. **Settings → Accessibility → NOVA Voice Controller → Enable**
            8. In app: **Set Wake Word → record 20 samples → Train**
            9. Say your wake word → NOVA replies "Yes?" — you are ready

            ### Works on
            Samsung · Motorola · Xiaomi · Realme · OnePlus · Nokia · Any Android 8.0+

            ### Requirements
            - Android 8.0 or higher (API 26+)
            - 3 GB RAM minimum
            - Microphone

            ### Features
            Custom wake word trained on your voice · Calls · SMS · Open any app
            Volume, brightness, WiFi, Bluetooth, flashlight · Navigate, screenshot
            PC control over WiFi · Smart home via Home Assistant
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}