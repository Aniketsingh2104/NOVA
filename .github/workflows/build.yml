name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;
          ls -la release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android.
            Built entirely from scratch — no third-party AI SDKs.

            ### How to install
            1. Download **NOVA-v1.0.${{ github.run_number }}.apk** below
            2. Open the file on your Android phone
            3. If prompted "Install unknown apps" — tap Settings → Allow
            4. Tap **Install**
            5. Open NOVA → grant Microphone permission
            6. Go to Settings → Accessibility → NOVA Voice Controller → Enable
            7. In app: Set Wake Word → record 20 samples → Train → say your wake word

            ### Requirements
            - Android 8.0 or higher
            - 3 GB RAM minimum
            - Microphone

            ### What NOVA can do
            - Wake on your custom word (trained on your voice)
            - Calls, SMS, WhatsApp
            - Open any app
            - Volume, brightness, WiFi, Bluetooth, flashlight
            - Navigate — home, back, recent apps, scroll, screenshot
            - Screen reading and vision
            - PC control over LAN
            - Smart home via Home Assistant
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}