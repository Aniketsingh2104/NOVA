name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Generate debug keystore (makes APK installable on all phones)
        run: |
          keytool -genkeypair \
            -alias nova_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore nova_release.jks \
            -storepass nova2024 \
            -keypass nova2024 \
            -dname "CN=NOVA,OU=App,O=Aniket,L=Surat,ST=Gujarat,C=IN" \
            -deststoretype pkcs12
          echo "Keystore created"

      - name: Build release APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/nova_release.jks \
            -Pandroid.injected.signing.store.password=nova2024 \
            -Pandroid.injected.signing.key.alias=nova_key \
            -Pandroid.injected.signing.key.password=nova2024 \
            2>&1 | tee /tmp/build.txt || true
          if grep -q "BUILD SUCCESSFUL" /tmp/build.txt; then
            echo "BUILD_OK=true" >> $GITHUB_ENV
            echo "Release APK built successfully"
          else
            echo "BUILD_OK=false" >> $GITHUB_ENV
            # Fall back to debug APK
            echo "Release failed, trying debug..."
            gradle assembleDebug 2>&1 | tee /tmp/build_debug.txt || true
            if grep -q "BUILD SUCCESSFUL" /tmp/build_debug.txt; then
              echo "BUILD_OK=true" >> $GITHUB_ENV
              echo "Debug APK built successfully"
            fi
          fi

      - name: Copy APK
        if: env.BUILD_OK == 'true'
        run: |
          mkdir -p release
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" release/NOVA-v1.0.${{ github.run_number }}.apk
            echo "APK: $(ls -lh release/)"
          else
            echo "No APK found"
            exit 1
          fi

      - name: Upload APK as artifact
        if: env.BUILD_OK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: env.BUILD_OK == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "NOVA v1.0.${{ github.run_number }}"
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android.
            No internet. No third-party AI SDKs. Built entirely from scratch.

            ### How to install
            1. Download **NOVA-v1.0.${{ github.run_number }}.apk** below
            2. Open it on your Android phone
            3. If Android asks "Allow install from this source" — tap **Settings → turn it ON → go back**
            4. Tap **Install**
            5. If Play Protect warns — tap **Install anyway**
            6. Open NOVA → grant Microphone + Phone permissions
            7. Settings → Accessibility → NOVA Voice Controller → Enable
            8. In app: Set Wake Word → record 20 samples → Train → say your wake word

            ### Requirements
            - Android 8.0 or higher
            - 3 GB RAM minimum
          files: release/NOVA-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}