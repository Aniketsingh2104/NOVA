name: Build and Release NOVA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: List APK output
        run: find app/build/outputs/apk -name "*.apk" -exec ls -la {} \;

      - name: Copy and rename APK
        run: |
          mkdir -p release
          find app/build/outputs/apk -name "*.apk" -exec cp {} release/NOVA-v1.0.${{ github.run_number }}.apk \;
          ls -la release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOVA-APK
          path: release/NOVA-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NOVA v1.0.${{ github.run_number }}
          body: |
            ## NOVA Voice Controller

            100% offline AI voice controller for Android. No internet. No third-party AI SDKs.

            ### How to install
            1. Download **NOVA-v1.0.${{ github.run_number }}.apk** below
            2. Open it on your Android phone
            3. If prompted, tap Settings and allow "Install unknown apps"
            4. Tap Install
            5. Open NOVA, grant Microphone permission, enable Accessibility Service, train your wake word

            ### Requirements
            - Android 8.0+ (API 26)
            - 3 GB RAM minimum
            - Microphone

            ### First time setup
            After installing: Set Wake Word → record 20 samples → tap Train → say your wake word → NOVA says "Yes?"
          files: release/NOVA-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}